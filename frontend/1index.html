<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>할래말래</title>
  <link rel="stylesheet" href="1style.css" />
</head>
<body>
  <div class="page">

    <div class="main">

      <p class="subtitle">다이어트</p>
      <h1 class="title">할래말래</h1>

      <!-- 침 -->
      <div id="needleWrap" class="needle-wrap">
        <div class="needle-anim">
          <svg
            width="18"
            height="48"
            viewBox="0 0 18 48"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="
                M8.2 0
                L9.8 0
                L12.5 40
                L5.5 40
                Z
              "
              fill="#DC2626"
            />
          </svg>
        </div>
      </div>

      <!-- 입력칸 -->
      <div id="inputWrap" class="input-wrap">
        <input
          id="mainInput"
          type="text"
          placeholder="내용을 입력하세요"
        />
        <button>확인</button>
      </div>

      <div id="guideText">당신의 결정을 도와드립니다</div>

    </div>
  </div>

  <script src="1script.js"></script>
  
</body>
